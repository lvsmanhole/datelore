name: Auto-post pins to Pinterest
on:
  schedule:
    - cron: '0 15 * * *'   # 15:00 UTC daily — drips the next batch
  workflow_dispatch:
    inputs:
      quota:
        description: 'Max pins to post this run'
        default: '8'
      dry_run:
        description: 'Dry run (select + print only, no posting)'
        type: boolean
        default: false
permissions:
  contents: write
concurrency:
  group: pinterest-autopost
  cancel-in-progress: false   # never interrupt a posting run mid-flight
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Post next pin batch
        run: npx tsx scripts/post-to-pinterest.ts
        env:
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PIN_QUOTA: ${{ github.event.inputs.quota || '8' }}
          PIN_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
      - name: Commit the posted ledger if it changed
        run: |
          git config user.name "datelore-bot"
          git config user.email "actions@users.noreply.github.com"
          git add pinterest-posted.json
          if git diff --staged --quiet; then
            echo "No new pins posted."
          else
            git commit -m "chore(pins): record auto-posted batch"
            git push
          fi
